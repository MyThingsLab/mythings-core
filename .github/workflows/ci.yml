name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Supersede in-flight runs when an agent pushes again to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip while a PR is a draft; always run on pushes to main.
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the secret-scan diff range below can resolve both
          # the PR's base and head SHAs -- a shallow (default) clone wouldn't
          # have the base commit locally.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Tests
        run: pytest --cov=mythings --cov-report=xml
      - name: Secret scan (added lines vs base)
        if: github.event_name == 'pull_request'
        run: |
          python -m mythings._secrets scan-diff-range \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
      - name: Secret scan (PR title + body)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" \
            --json title,body --jq '.title + "\n" + .body' \
            | python -m mythings._secrets scan-text
      # Warn-only for now (continue-on-error): pip-audit's advisory DB flags a
      # lot of transitive dev-dependency noise the fleet hasn't triaged yet.
      # Tripwire first, gate once the false-positive rate is known -- see
      # docs/CONVENTIONS.md "Dependency-vulnerability scanning" for the plan
      # to flip this to a hard gate.
      - name: Dependency vulnerability scan (warn-only)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
